apiVersion: apps/v1
kind: Deployment
metadata:
  name: agriculture-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agriculture
  template:
    metadata:
      labels:
        app: agriculture
    spec:
      containers:
      - name: agriculture-container
        image: vinodh21/agriculture:latest
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: agriculture-service
spec:
  type: NodePort
  selector:
    app: agriculture
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 31111

