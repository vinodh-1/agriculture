apiVersion: apps/v1
kind: Deployment
metadata:
  name: bike-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bike
  template:
    metadata:
      labels:
        app: bike
    spec:
      containers:
      - name: bike-container
        image: vinodh21/agriculture:latest
        ports:
        - containerPort: 1337

---
apiVersion: v1
kind: Service
metadata:
  name: bike-service
spec:
  selector:
    app: bike
  ports:
  - port: 80
    targetPort: 1337
  type: ClusterIP
