<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriSmart Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef7ee;
}

header {
    background: url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854') center/cover;
    color: white;
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    font-size: 40px;
}

nav {
    background: #2e7d32;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

nav button {
    background: none;
    border: none;
    color: white;
    padding: 15px;
    cursor: pointer;
}

nav button:hover {
    background: #1b5e20;
}

.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

img.crop {
    width: 100%;
    border-radius: 10px;
}

input, select {
    padding: 8px;
    margin: 5px;
    width: 200px;
}

button.action {
    background: #4caf50;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

button.action:hover {
    background: #2e7d32;
}

footer {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<header>
<h1>🌱 AgriSmart Pro</h1>
<p>Modern Agriculture Dashboard</p>
</header>

<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('profile')">Profile</button>
<button onclick="showSection('crops')">Crops</button>
<button onclick="showSection('weather')">Weather</button>
<button onclick="showSection('tools')">Tools</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<div class="card">
<h2>Welcome 👨‍🌾</h2>
<p>Smart farming tools to boost productivity.</p>
<img class="crop" src="https://images.unsplash.com/photo-1560493676-04071c5f467b">
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
<div class="card">
<h2>Farmer Profile</h2>
<input type="text" id="name" placeholder="Enter your name">
<button class="action" onclick="saveName()">Save</button>
<p id="savedName"></p>
</div>
</div>

<!-- CROPS -->
<div id="crops" class="section">

<div class="card">
<h2>Crop Suggestion</h2>

<select id="season">
<option value="">Select Season</option>
<option value="Kharif">Kharif</option>
<option value="Rabi">Rabi</option>
</select>

<button class="action" onclick="suggestCrop()">Suggest</button>
<p id="cropResult"></p>
</div>

<div class="card">
<h3>Popular Crops</h3>

<img class="crop" src="https://images.unsplash.com/photo-1598514982201-8f7b4b1a0b59">
<p>🌾 Rice</p>

<img class="crop" src="https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b">
<p>🌽 Maize</p>

<img class="crop" src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3">
<p>🌱 Wheat</p>

</div>

</div>

<!-- WEATHER -->
<div id="weather" class="section">
<div class="card">
<h2>Weather Checker</h2>

<input type="text" id="city" placeholder="Enter city">
<button class="action" onclick="getWeather()">Check</button>

<p id="weatherResult"></p>

<img class="crop" src="https://images.unsplash.com/photo-1501973801540-537f08ccae7b">
</div>
</div>

<!-- TOOLS -->
<div id="tools" class="section">

<div class="card">
<h2>Fertilizer Calculator</h2>
<input type="number" id="land" placeholder="Acres">
<button class="action" onclick="calculateFertilizer()">Calculate</button>
<p id="fertResult"></p>
</div>

<div class="card">
<h2>Water Reminder</h2>
<button class="action" onclick="waterReminder()">Start Reminder</button>
</div>

<div class="card">
<h2>Profit Estimator</h2>
<input type="number" id="income" placeholder="Income">
<input type="number" id="expense" placeholder="Expense">
<button class="action" onclick="calculateProfit()">Calculate</button>
<p id="profitResult"></p>
</div>

</div>

<footer>
<p>© 2026 AgriSmart Pro</p>
</footer>

<script>
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// PROFILE SAVE
function saveName() {
    let name = document.getElementById('name').value;
    localStorage.setItem('farmerName', name);
    document.getElementById('savedName').innerHTML = "Saved: " + name;
}

// LOAD NAME
window.onload = function() {
    let name = localStorage.getItem('farmerName');
    if (name) {
        document.getElementById('savedName').innerHTML = "Welcome back, " + name;
    }
}

// CROP SUGGESTION
function suggestCrop() {
    let season = document.getElementById('season').value;
    let result = document.getElementById('cropResult');

    if (season === "Kharif") {
        result.innerHTML = "🌾 Rice, Cotton, Sugarcane";
    } else if (season === "Rabi") {
        result.innerHTML = "🌱 Wheat, Mustard, Barley";
    } else {
        result.innerHTML = "Select season!";
    }
}

// WEATHER
function getWeather() {
    let city = document.getElementById('city').value;
    let result = document.getElementById('weatherResult');

    if (city === "") {
        result.innerHTML = "Enter city!";
    } else {
        result.innerHTML = "☀️ " + city + ": 32°C, Sunny (Demo)";
    }
}

// FERTILIZER
function calculateFertilizer() {
    let land = document.getElementById('land').value;
    let fert = land * 50;
    document.getElementById('fertResult').innerHTML = fert + " kg needed";
}

// WATER REMINDER
function waterReminder() {
    setTimeout(() => {
        alert("💧 Water your crops!");
    }, 3000);
}

// PROFIT
function calculateProfit() {
    let income = document.getElementById('income').value;
    let expense = document.getElementById('expense').value;
    let profit = income - expense;
    document.getElementById('profitResult').innerHTML = "Profit: ₹" + profit;
}
</script>

</body>
</html>
